<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Online Shopping Cart</h1>
    </header>

    <div class="container">

        <!-- Products -->
        <div class="products">

            <div class="product">
                <h3>Laptop</h3>
                <p>Price: ₹50000</p>
                <button onclick="addToCart('Laptop', 50000)">
                    Add to Cart
                </button>
            </div>

            <div class="product">
                <h3>Smartphone</h3>
                <p>Price: ₹20000</p>
                <button onclick="addToCart('Smartphone', 20000)">
                    Add to Cart
                </button>
            </div>

            <div class="product">
                <h3>Headphones</h3>
                <p>Price: ₹3000</p>
                <button onclick="addToCart('Headphones', 3000)">
                    Add to Cart
                </button>
            </div>

        </div>

        <!-- Cart -->
        <div class="cart">
            <h2>Shopping Cart</h2>

            <ul id="cart-items"></ul>

            <h3>Total: ₹<span id="total">0</span></h3>

            <button class="clear-btn" onclick="clearCart()">
                Clear Cart
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
